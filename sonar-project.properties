# SonarCloud project identity. The SonarCloud project must be created on
# the SonarCloud side and `SONAR_TOKEN` added to repo secrets before the
# scan step in tests.yml will actually run (it is gated on the token's
# presence, so absence is a no-op rather than a CI failure).
sonar.projectKey=agentculture_telegram-agent
sonar.organization=agentculture

# Source layout — package lives at the top level (no src/ wrapper).
sonar.sources=telegram_agent
sonar.tests=tests

# Coverage report produced in CI by `uv run pytest --cov-report=xml:coverage.xml`
# (see .github/workflows/tests.yml). Path is relative to the repo root.
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.12

# Don't analyze noise.
sonar.exclusions=**/__pycache__/**,**/.venv/**,uv.lock
